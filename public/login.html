<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Chainlink Data Streams</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #fafbfc;
      color: #141921;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .login-card {
      background: #fff;
      border: 1px solid #ecedef;
      border-radius: 12px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      margin: 20px;
      text-align: center;
    }
    .logo {
      width: 48px;
      height: 48px;
      margin: 0 auto 24px;
    }
    .login-title {
      font-size: 24px;
      font-weight: 600;
      color: #141921;
      margin-bottom: 8px;
    }
    .login-subtitle {
      font-size: 14px;
      color: #6d7380;
      margin-bottom: 32px;
    }
    .form-group {
      text-align: left;
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #1a2b6b;
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      height: 44px;
      border: 1px solid #c4c9d2;
      border-radius: 6px;
      padding: 0 14px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: #141921;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus {
      border-color: #0847f7;
    }
    .form-input.error {
      border-color: #dc2626;
    }
    .error-msg {
      font-size: 13px;
      color: #dc2626;
      margin-top: 8px;
      display: none;
    }
    .error-msg.show {
      display: block;
    }
    .login-btn {
      width: 100%;
      height: 44px;
      border: none;
      border-radius: 6px;
      background: #0847f7;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .login-btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <svg class="logo" viewBox="0 0 48 48" fill="none">
      <path d="M24 0L44.7846 12V36L24 48L3.21539 36V12L24 0Z" fill="#375BD2"/>
      <path d="M24 13.2L34.3923 19.2V31.2L24 37.2L13.6077 31.2V19.2L24 13.2Z" fill="white"/>
    </svg>
    <h1 class="login-title">Chainlink Data Streams</h1>
    <p class="login-subtitle">Enter the password to continue</p>
    <form action="/api/login" method="POST">
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password" placeholder="Enter password" autofocus required>
        <p class="error-msg" id="error-msg">Incorrect password. Please try again.</p>
      </div>
      <button class="login-btn" type="submit">Continue</button>
    </form>
  </div>
  <script>
    if (window.location.search.includes('error=1')) {
      document.getElementById('error-msg').classList.add('show');
      document.getElementById('password').classList.add('error');
    }
  </script>
</body>
</html>
